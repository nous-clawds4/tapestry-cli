version: "3.8"

services:
  strfry:
    build:
      context: .
      dockerfile: Dockerfile.strfry
    ports:
      - "7777:7777"
    volumes:
      - strfry-data:/app/strfry-db
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/tapestry-dev-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  tapestry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tapestry
    ports:
      - "3000:3000"
    environment:
      - RELAY_URL=${RELAY_URL:-ws://strfry:7777}
      - DCOSL_RELAY_URL=${DCOSL_RELAY_URL:-wss://dcosl.brainstorm.social/relay}
      - OBSERVER_PUBKEY=${OBSERVER_PUBKEY:-15bbe95f249325e1a80ab1f87cf42a53b712cb3542838c7e302fc7a40d7384e0}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/tapestry-dev-password}
    depends_on:
      neo4j:
        condition: service_healthy
      strfry:
        condition: service_started
    restart: unless-stopped

volumes:
  strfry-data:
  neo4j-data:
  neo4j-plugins:
